<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherSphere | Choose Your State</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Premium Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Animated Background Layers (Consistent with Country Selection) -->
    <div class="bg-wrapper">
        <div class="gradient-bg"></div>
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <div class="content-container">
        <!-- Header -->
        <header>
            <button class="back-btn glass" id="backBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Back
            </button>
            <div class="header-text">
                <h1 class="page-title">Choose Your State</h1>
                <p class="subtitle" id="selectedCountryDisplay">Loading context...</p>
            </div>
            <div class="spacer"></div>
        </header>

        <!-- Main State Grid -->
        <main>
            <div class="state-grid" id="stateGrid">
                <!-- States will be injected dynamically by JavaScript -->
            </div>
        </main>
    </div>

    <!-- Selection Overlay -->
    <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="loader-content">
            <div class="spinner"></div>
            <p class="loading-text">Loading Cities...</p>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
