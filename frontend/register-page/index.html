<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherSphere | Create Account</title>
    <!-- Premium Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Animated Background Layers (Mirrored from Login) -->
    <div class="bg-wrapper">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="glow-orb orb-3"></div>
    </div>

    <div class="login-container">
        <!-- Glass Card -->
        <main class="login-card">
            <header class="card-header">
                <div class="logo-area">
                    <span class="logo-icon">🌐</span>
                    <h1 class="logo-text">WEATHER<span>SPHERE</span></h1>
                </div>
                <h2>Create your Account</h2>
                <p class="subtitle">Join WeatherSphere and explore live weather around the world.</p>
            </header>

            <form id="registerForm" class="login-form" novalidate>
                <!-- Full Name Field -->
                <div class="input-group">
                    <label for="fullName">Full Name</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-user field-icon"></i>
                        <input type="text" id="username" placeholder="John Doe" required>
                    </div>
                    <span class="validation-msg" id="nameError">Name is required</span>
                </div>

                <!-- Email Field -->
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-envelope field-icon"></i>
                        <input type="email" id="email" placeholder="name@company.com" required>
                    </div>
                    <span class="validation-msg" id="emailError">Please enter a valid email</span>
                </div>

                <!-- Password Field -->
                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock field-icon"></i>
                        <input type="password" id="password" placeholder="Min. 8 characters" required>
                        <button type="button" class="toggle-password" data-target="password">
                            <i class="fa-regular fa-eye toggle-icon"></i>
                        </button>
                    </div>
                    <span class="validation-msg" id="passwordError">Password must be at least 8 characters</span>
                </div>

                <!-- Confirm Password Field -->
                <div class="input-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-shield-check field-icon"></i>
                        <input type="password" id="confirmPassword" placeholder="••••••••" required>
                        <button type="button" class="toggle-password" data-target="confirmPassword">
                            <i class="fa-regular fa-eye toggle-icon"></i>
                        </button>
                    </div>
                    <span class="validation-msg" id="confirmError">Passwords do not match</span>
                </div>

                <!-- Terms & Privacy -->
                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox" id="terms">
                        <span class="checkmark"></span>
                        I agree to the <a href="#" class="inline-link">Terms & Privacy Policy</a>
                    </label>
                </div>

                <!-- Actions -->
                <div class="button-stack">
                    <button onclick="registerUser()" type="button" id="submitBtn" class="btn btn-primary" >
                        <span>Create Account</span>
                        <i class="fa-solid fa-user-plus"></i>
                    </button>
                    
                    <div class="divider">
                        <span>OR</span>
                    </div>

                    <button type="button" class="btn btn-google" onclick="registerWithGoogle()">
                        <svg class="google-icon" viewBox="0 0 24 24">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                        </svg>
                        Continue with Google
                    </button>
                </div>
            </form>

            <footer class="card-footer">
                <p>Already have an account? <a href="../login-page/index.html">Sign In</a></p>
            </footer>
        </main>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
