<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherSphere | Premium Forecast</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Background Elements -->
    <div class="bg-gradient"></div>
    <div id="particles-container"></div>

    <header class="app-header">
        <h1 class="logo">Weather<span>Sphere</span></h1>
        <button class="glass-btn home-city-btn" id="homeBtn">
            <i data-lucide="map-pin"></i>
            <span>My Home City</span>
        </button>
    </header>

    <main id="app-container">
        
        <!-- SECTION 1: LANDING -->
        <section id="landing-page" class="view active">
            <div class="globe-wrapper">
                <div class="floating-icons">
                    <div class="f-icon top-left"><i data-lucide="sun"></i></div>
                    <div class="f-icon top-right"><i data-lucide="cloud-rain"></i></div>
                    <div class="f-icon bottom-left"><i data-lucide="snowflake"></i></div>
                    <div class="f-icon bottom-right"><i data-lucide="cloud-lightning"></i></div>
                </div>
                <div class="globe-container" id="mainGlobe">
                    <div class="globe">
                        <div class="globe-texture"></div>
                    </div>
                    <div class="globe-shadow"></div>
                </div>
            </div>
            <div class="landing-text">
                <p>Click the globe to explore weather around the world.</p>
            </div>
        </section>

        <!-- SECTION 2: COUNTRY SELECTION -->
        <section id="country-selection" class="view hidden">
            <div class="section-header">
                <h2>Choose the country whose weather you want to explore</h2>
            </div>
            <div class="grid-container" id="countryGrid">
                <!-- Cards injected via JS -->
            </div>
        </section>

        <!-- SECTION 3: STATE SELECTION -->
        <section id="state-selection" class="view hidden">
            <div class="section-header">
                <button class="back-btn"><i data-lucide="arrow-left"></i></button>
                <h2>Choose your State</h2>
            </div>
            <div class="grid-container" id="stateGrid">
                <!-- Cards injected via JS -->
            </div>
        </section>

        <!-- SECTION 4: CITY SELECTION -->
        <section id="city-selection" class="view hidden">
            <div class="section-header">
                <button class="back-btn"><i data-lucide="arrow-left"></i></button>
                <h2>Choose your City</h2>
            </div>
            <div class="grid-container" id="cityGrid">
                <!-- Cards injected via JS -->
            </div>
        </section>

        <!-- SECTION 5: DASHBOARD -->
        <section id="weather-dashboard" class="view hidden">
            <!-- Dashboard content injected via JS -->
        </section>

    </main>

    <script src="js/script.js"></script>
</body>
</html>
