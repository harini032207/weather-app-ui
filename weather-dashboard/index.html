<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherSphere | Live Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Animated Background -->
    <div class="bg-wrapper">
        <div class="gradient-bg"></div>
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <div class="dashboard-container">
        <!-- Sidebar / Navigation -->
        <aside class="sidebar glass">
            <div class="logo">WS<span>.</span></div>
            <nav>
                <button class="nav-item active" id="homeBtn" title="Weather"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg></button>
                <button class="nav-item" id="changeLocation" title="Change Location"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg></button>
            </nav>
            <div class="user-avatar glass">
                <div class="status-dot"></div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Header -->
            <header class="dashboard-header">
                <div class="header-left">
                    <h1 id="currentCity">Loading...</h1>
                    <p id="currentDate">Date Placeholder</p>
                </div>
                <div class="search-bar glass">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="citySearch" placeholder="Search another city...">
                </div>
            </header>

            <!-- Weather Grid -->
            <div class="weather-grid">
                <!-- Left: Main Weather Card -->
                <section class="main-weather glass">
                    <div class="weather-visual">
                        <img id="weatherIcon" src="" alt="Weather Icon">
                        <div class="temp-group">
                            <span id="temperature">--</span><span class="unit">°C</span>
                        </div>
                    </div>
                    <div class="weather-info">
                        <h2 id="weatherDesc">Description</h2>
                        <div class="high-low">
                            <span>H: <b id="tempMax">--°</b></span>
                            <span>L: <b id="tempMin">--°</b></span>
                        </div>
                    </div>
                </section>

                <!-- Right: Detailed Stats -->
                <section class="stats-grid">
                    <div class="stat-card glass">
                        <div class="stat-label">Humidity</div>
                        <div class="stat-value" id="humidity">--%</div>
                        <div class="stat-bar"><div class="fill" id="humidityBar"></div></div>
                    </div>
                    <div class="stat-card glass">
                        <div class="stat-label">Wind Speed</div>
                        <div class="stat-value" id="windSpeed">-- km/h</div>
                        <div class="stat-icon">💨</div>
                    </div>
                    <div class="stat-card glass">
                        <div class="stat-label">Pressure</div>
                        <div class="stat-value" id="pressure">-- hPa</div>
                        <div class="stat-icon">⏲️</div>
                    </div>
                    <div class="stat-card glass">
                        <div class="stat-label">Visibility</div>
                        <div class="stat-value" id="visibility">-- km</div>
                        <div class="stat-icon">👁️</div>
                    </div>
                </section>

                <!-- Bottom: 5 Day Forecast -->
                <section class="forecast-container glass">
                    <h3>5-Day Forecast</h3>
                    <div class="forecast-list" id="forecastList">
                        <!-- Dynamically Injected -->
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
